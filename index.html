<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股行业数据 - 每日更新</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 40px 0;
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { color: #888; font-size: 1.1em; }
        .update-time { color: #4ade80; margin-top: 10px; }
        
        .filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .date-select {
            padding: 10px 20px;
            font-size: 16px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1e1e3f;
            color: #fff;
            cursor: pointer;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .stat-card {
            background: #1e1e3f;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value { font-size: 2em; font-weight: bold; color: #4ade80; }
        .stat-label { color: #888; margin-top: 5px; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e1e3f;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            background: #16213e;
            font-weight: 600;
            color: #4ade80;
        }
        tr:hover { background: #252550; }
        .rank { 
            display: inline-block;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
            border-radius: 50%;
            background: #333;
            font-weight: bold;
        }
        .rank-1 { background: #ffd700; color: #000; }
        .rank-2 { background: #c0c0c0; color: #000; }
        .rank-3 { background: #cd7f32; color: #000; }
        
        .positive { color: #4ade80; }
        .negative { color: #f87171; }
        
        footer {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #888;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            th, td { padding: 10px; font-size: 14px; }
            .filters { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 A股行业数据</h1>
            <p class="subtitle">每日行业涨幅排行 · 前复权计算</p>
            <p class="update-time" id="updateTime">加载中...</p>
        </header>
        
        <div class="filters">
            <select class="date-select" id="dateSelect">
                <option value="">选择日期</option>
            </select>
        </div>
        
        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-value" id="industryCount">-</div>
                <div class="stat-label">行业数量</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgChange">-</div>
                <div class="stat-label">平均涨幅</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="topIndustry">-</div>
                <div class="stat-label">涨幅最高行业</div>
            </div>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>排名</th>
                    <th>行业名称</th>
                    <th>平均涨幅</th>
                    <th>股票数量</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="4" class="loading">加载中...</td></tr>
            </tbody>
        </table>
        
        <footer>
            <p>数据来源: Tushare · 自动更新</p>
            <p>由 GitHub Actions 驱动</p>
        </footer>
    </div>
    
    <script>
        const DATA_DIR = 'data';
        let allData = {};
        
        async function loadDates() {
            try {
                // 获取所有数据文件
                const response = await fetch(DATA_DIR + '/');
                const text = await response.text();
                const dates = [...text.matchAll(/(\d{8}\.csv)/g)].map(m => m[1].replace('.csv', ''));
                
                if (dates.length === 0) {
                    document.getElementById('dateSelect').innerHTML = '<option value="">暂无数据</option>';
                    return;
                }
                
                // 按日期排序（最新的在前面）
                dates.sort((a, b) => b - a);
                
                const select = document.getElementById('dateSelect');
                dates.forEach(date => {
                    const option = document.createElement('option');
                    option.value = date;
                    option.textContent = formatDate(date);
                    select.appendChild(option);
                });
                
                // 加载最新日期的数据
                if (dates.length > 0) {
                    select.value = dates[0];
                    await loadData(dates[0]);
                }
            } catch (error) {
                console.error('加载日期列表失败:', error);
            }
        }
        
        async function loadData(date) {
            try {
                const response = await fetch(DATA_DIR + '/' + date + '.csv');
                const text = await response.text();
                const data = parseCSV(text);
                
                allData[date] = data;
                renderTable(data);
                renderStats(data, date);
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="4" class="loading">加载失败</td></tr>';
            }
        }
        
        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines[0].split(',').map(h => h.replace(/"/g, ''));
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',').map(v => v.replace(/"/g, '').trim());
                const row = {};
                headers.forEach((h, idx) => {
                    row[h] = values[idx];
                });
                data.push(row);
            }
            
            return data;
        }
        
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map(row => {
                const rank = parseInt(row['排名']);
                const change = parseFloat(row['平均涨幅']);
                const changeClass = change >= 0 ? 'positive' : 'negative';
                const changePrefix = change >= 0 ? '+' : '';
                
                return `
                    <tr>
                        <td><span class="rank rank-${rank <= 3 ? rank : ''}">${rank}</span></td>
                        <td>${row['行业名称'] || '-'}</td>
                        <td class="${changeClass}">${changePrefix}${change}%</td>
                        <td>${row['股票数量'] || '-'}</td>
                    </tr>
                `;
            }).join('');
        }
        
        function renderStats(data, date) {
            document.getElementById('updateTime').textContent = '最后更新: ' + formatDate(date);
            document.getElementById('industryCount').textContent = data.length;
            
            const changes = data.map(d => parseFloat(d['平均涨幅'])).filter(c => !isNaN(c));
            const avg = changes.length > 0 ? (changes.reduce((a, b) => a + b, 0) / changes.length).toFixed(2) : 0;
            document.getElementById('avgChange').textContent = (avg >= 0 ? '+' : '') + avg + '%';
            document.getElementById('avgChange').className = 'stat-value ' + (avg >= 0 ? 'positive' : 'negative');
            
            if (data.length > 0) {
                document.getElementById('topIndustry').textContent = data[0]['行业名称'] || '-';
            }
        }
        
        function formatDate(dateStr) {
            return dateStr.slice(0, 4) + '-' + dateStr.slice(4, 6) + '-' + dateStr.slice(6, 8);
        }
        
        document.getElementById('dateSelect').addEventListener('change', async (e) => {
            const date = e.target.value;
            if (date && allData[date]) {
                renderTable(allData[date]);
                renderStats(allData[date], date);
            } else if (date) {
                await loadData(date);
            }
        });
        
        // 初始化
        loadDates();
    </script>
</body>
</html>
